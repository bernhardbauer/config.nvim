git:
  commitPrefix:
    - pattern: "^(bugfix|maintenance)/(\\w+-\\w+).*"
      replace: "fix($2): "
    - pattern: "^\\w+/(\\w+-\\w+).*"
      replace: "feat($1): "
    - pattern: "^.*"
      replace: "feat: "
customCommands:
  - key: "n"
    context: "localBranches"
    prompts:
      - type: "menu"
        title: "What kind of branch is it?"
        key: "BranchType"
        options:
          - name: "feature"
            description: "a feature branch"
            value: "feature"
          - name: "bugfix"
            description: "a bugfix branch"
            value: "bugfix"
          - name: "maintenance"
            description: "a maintenance branch"
            value: "maintenance"
      - type: "input"
        title: "What is the new branch name?"
        key: "BranchName"
        initialValue: ""
    command: "git checkout -b '{{.Form.BranchType}}/{{.Form.BranchName}}'"
    loadingText: "Creating branch"
